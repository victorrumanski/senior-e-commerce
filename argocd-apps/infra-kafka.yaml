apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-kafka
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: kafka
    targetRevision: 32.4.3
    helm:
      values: |
        # Bitnami moved their free public images out of docker.io/bitnami in
        # August 2025. The legacy free images are still mirrored under
        # docker.io/bitnamilegacy, so we override every image the chart pulls
        # to use that registry/repo path.
        image:
          registry: docker.io
          repository: bitnamilegacy/kafka
        provisioning:
          enabled: true
          image:
            registry: docker.io
            repository: bitnamilegacy/kafka
          topics:
            - name: order-events
              partitions: 1
              replicationFactor: 1
            - name: payment-events
              partitions: 1
              replicationFactor: 1
            - name: shipping-events
              partitions: 1
              replicationFactor: 1
            - name: delivery-events
              partitions: 1
              replicationFactor: 1
        kubectl:
          image:
            registry: docker.io
            repository: bitnamilegacy/kubectl
        volumePermissions:
          image:
            registry: docker.io
            repository: bitnamilegacy/os-shell
        metrics:
          kafka:
            image:
              registry: docker.io
              repository: bitnamilegacy/kafka-exporter
          jmx:
            image:
              registry: docker.io
              repository: bitnamilegacy/jmx-exporter
        kraft:
          enabled: true
        zookeeper:
          enabled: false
        controller:
          replicaCount: 1
        broker:
          replicaCount: 1
        listeners:
          client:
            protocol: PLAINTEXT
          interbroker:
            protocol: PLAINTEXT
          controller:
            protocol: PLAINTEXT
        auth:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true
