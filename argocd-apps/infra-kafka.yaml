apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-kafka
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: kafka
    targetRevision: 32.4.3
    helm:
      values: |
        kraft:
          enabled: true
        zookeeper:
          enabled: false
        controller:
          replicaCount: 1
        broker:
          replicaCount: 1
        listeners:
          client:
            protocol: PLAINTEXT
          interbroker:
            protocol: PLAINTEXT
          controller:
            protocol: PLAINTEXT
        auth:
          enabled: false
        provisioning:
          enabled: true
          topics:
            - name: order-events
              partitions: 1
              replicationFactor: 1
            - name: payment-events
              partitions: 1
              replicationFactor: 1
            - name: shipping-events
              partitions: 1
              replicationFactor: 1
            - name: delivery-events
              partitions: 1
              replicationFactor: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true
