apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-clickhouse
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: clickhouse
    targetRevision: 7.2.3
    helm:
      values: |
        replicaCount: 1
        auth:
          username: default
          password: clickhouse
        persistence:
          enabled: true
          size: 2Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: analytics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
