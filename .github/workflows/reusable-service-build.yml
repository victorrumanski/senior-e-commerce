# -------------------------------------------------------------------------------------------------
# REUSABLE CI/CD TEMPLATE FOR MICROSERVICES
# -------------------------------------------------------------------------------------------------
# This workflow acts like a "function" in programming.
# Each microservice "calls" this file to run their CI/CD logic without duplicating code.
# -------------------------------------------------------------------------------------------------

name: Reusable Java Service Build

on:
  # 'workflow_call' allows this workflow to be called by other workflows in other repositories.
  workflow_call:
    # 'inputs' are like parameters for a function.
    inputs:
      service_path:
        required: true
        type: string
        description: "The path to the service (e.g., services/auth-service)"
      service_name:
        required: true
        type: string
        description: "The name of the service (e.g., auth-service)"

jobs:
  # --- JOB 1: BUILD AND TEST ---
  # This runs first to ensure the code is valid before we try to build an image.
  maven-build:
    runs-on: ubuntu-latest
    steps:
    # 1. Checkout the source code.
    - uses: actions/checkout@v4
    
    # 2. Setup Java and Maven cache.
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
        
    # 3. Build the JAR file.
    - name: Build with Maven
      run: mvn -B package --file ${{ inputs.service_path }}/pom.xml

  # --- JOB 2: DOCKER RELEASE ---
  # This runs only after maven-build finishes successfully.
  docker-release:
    runs-on: ubuntu-latest
    needs: maven-build
    
    # We must explicitly grant write permissions to the GHCR package registry.
    permissions:
      contents: read
      packages: write
      
    steps:
    # 1. Checkout the code again to have access to the Dockerfile.
    - uses: actions/checkout@v4
    
    # 2. Login to GitHub Container Registry.
    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 3. Generate image metadata and tags.
    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}
        tags: |
          type=sha
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          latest

    # 4. Build the image and push it to GitHub Container Registry.
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.service_path }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
