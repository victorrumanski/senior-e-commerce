common-microservice:
  replicaCount: 1
  image:
    repository: ghcr.io/victorrumanski/payments-service
    tag: "latest"
  service:
    port: 80
    targetPort: 8080
  env:
    dbHost: "postgres-postgresql.data.svc.cluster.local"
    dbName: "ecomm"
    dbUser: "ecomm"
    dbSchema: "payments"
    kafkaHost: "kafka.data.svc.cluster.local"
  probes:
    enabled: true
  ingress:
    enabled: true
    className: "traefik"
    host: "payments.localtest.me"
